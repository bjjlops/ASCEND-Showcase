<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="ASCEND — Disciplined execution, by design.">
  <defs>
    <radialGradient id="glow" cx="22%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#1b1b20"/>
      <stop offset="100%" stop-color="#0a0a0b"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0cd6b"/>
      <stop offset="55%" stop-color="#e3b341"/>
      <stop offset="100%" stop-color="#b8882a"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" fill="url(#glow)"/>

  <!-- ascent mark: stacked upward chevrons -->
  <g transform="translate(150 180)" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="-46,40 0,-6 46,40" opacity="0.35"/>
    <polyline points="-46,12 0,-34 46,12" opacity="0.65"/>
    <polyline points="-46,-16 0,-62 46,-16"/>
  </g>

  <!-- wordmark -->
  <text x="270" y="172" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="104" font-weight="700" letter-spacing="14" fill="#f5f2ea">ASCEND</text>

  <!-- gold rule -->
  <rect x="274" y="200" width="118" height="4" rx="2" fill="url(#gold)"/>

  <!-- tagline -->
  <text x="276" y="244" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" font-weight="400" letter-spacing="1" fill="#cfcfd6">Disciplined execution, by design.</text>

  <!-- product verbs -->
  <text x="276" y="288" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="20" font-weight="600" letter-spacing="6" fill="#8a8a93">PLAN&#160;&#160;·&#160;&#160;FOCUS&#160;&#160;·&#160;&#160;REVIEW&#160;&#160;·&#160;&#160;EXECUTE</text>
</svg>
